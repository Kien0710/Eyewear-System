# ═══════════════════════════════════════════════════════════════
#  Eyewear System — SonarQube Configuration
#  Tất cả cấu hình scan nằm ở đây (single source of truth)
#  Jenkinsfile chỉ truyền thêm projectVersion + token
# ═══════════════════════════════════════════════════════════════

# ── Project Identification ─────────────────────────────────────
sonar.projectKey=eyewear-system
sonar.projectName=Eyewear System
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ── Project Links (hiện trên SonarQube dashboard) ──────────────
sonar.links.homepage=https://github.com/Kien0710/Eyewear-System
sonar.links.ci=https://github.com/Kien0710/Eyewear-System/actions
sonar.links.scm=https://github.com/Kien0710/Eyewear-System
sonar.links.issue=https://github.com/Kien0710/Eyewear-System/issues

# ── SCM ────────────────────────────────────────────────────────
sonar.scm.provider=git

# ── Source Directories ─────────────────────────────────────────
#    Chỉ scan code thực sự: PHP backend + JS frontend
sonar.sources=\
  backend/app,\
  backend/core,\
  backend/routes,\
  frontend/js

# ── Language Settings ──────────────────────────────────────────
sonar.php.file.suffixes=php

# ── Exclusions: bỏ qua vendor, libs, minified, assets ─────────
sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/*.min.js,\
  **/*.min.css,\
  backend/PHPMailer/**,\
  backend/scratch/**,\
  backend/tests/**,\
  frontend/assets/images/**

# ── Coverage: excluded (project dùng Postman, không có PHPUnit)
sonar.coverage.exclusions=**/*

# ── Duplication (CPD): loại bỏ false-positive từ assets ───────
sonar.cpd.exclusions=\
  frontend/assets/**,\
  **/*.min.js,\
  **/*.min.css
